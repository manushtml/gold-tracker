name: Daily Gold Price Tracker

on:
  # 排程已改由 Railway Cron Job 負責（每天 UTC 04:00 = 台灣 12:00，週一至週五）
  # schedule:
  #   - cron: '0 4 * * 1-5'
  # 保留手動觸發功能，方便測試
  workflow_dispatch:

permissions:
  contents: write  # 允許推送 price_history.json 回儲存庫

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      - name: Run gold price tracker
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          TARGET_PRICE: ${{ secrets.TARGET_PRICE }}
        run: |
          python gold_tracker_bot.py

      - name: Commit and push price history
        run: |
          git config --global user.name "Gold Tracker Bot"
          git config --global user.email "bot@gold-tracker.com"
          git add price_history.json data.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update price history [skip ci]"
          git push || true
